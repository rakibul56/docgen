# ===================================
# DocGen Service Configuration
# ===================================

server:
  port: 8080
  error:
    include-message: always
    include-exception: true
    include-stacktrace: always

spring:
  application:
    name: docgen-service

  # Thymeleaf template engine settings
  thymeleaf:
    prefix: classpath:/templates/ # Where to find templates
    suffix: .html # Template file extension
    mode: HTML # Parse as HTML

# Actuator settings
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
